name: Test Chirpity Compilation
run-name: ${{ github.actor }} is building Chirpity

on:
  push:
    branches:
      - 'master'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Runs ONCE: version check, git tag, and draft-release creation.
  # Avoids duplicate drafts when all three platform runners start simultaneously.
  # ─────────────────────────────────────────────────────────────────────────────
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    outputs:
      new_tag: ${{ steps.resolve.outputs.new_tag }}
      skip:    ${{ steps.resolve.outputs.skip }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
        with:
          lfs: true
          fetch-depth: 0

      - name: Resolve version and release state
        id: resolve
        shell: bash
        run: |
          PACKAGE_VERSION=$(jq -r .version package.json)
          NEW_TAG="v$PACKAGE_VERSION"
          LATEST_TAG=$(gh api repos/${{ github.repository }}/tags --jq '.[0].name' 2>/dev/null || echo "")

          echo "package_version : $PACKAGE_VERSION"
          echo "new_tag         : $NEW_TAG"
          echo "latest_tag      : $LATEST_TAG"

          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

          # Skip if this exact version is already a published (non-draft) release
          if [[ "$NEW_TAG" == "$LATEST_TAG" ]]; then
            RELEASE_INFO=$(gh api repos/${{ github.repository }}/releases/tags/$NEW_TAG 2>/dev/null || echo "")
            if [[ -n "$RELEASE_INFO" ]]; then
              IS_DRAFT=$(echo "$RELEASE_INFO" | jq -r '.draft')
              if [[ "$IS_DRAFT" == "false" ]]; then
                echo "⏭️  $NEW_TAG is already a published release – skipping build."
                echo "skip=true" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            fi
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Create and push Git tag
        if: steps.resolve.outputs.skip != 'true'
        shell: bash
        run: |
          NEW_TAG="${{ steps.resolve.outputs.new_tag }}"
          if git ls-remote --tags origin "refs/tags/$NEW_TAG" | grep -q "$NEW_TAG"; then
            echo "Tag $NEW_TAG already exists on remote – skipping."
          else
            git tag "$NEW_TAG"
            git push origin "$NEW_TAG"
            echo "✅ Pushed tag $NEW_TAG"
          fi

      # Creating the draft here means all three platform runners upload into the
      # same existing release rather than each racing to create their own.
      - name: Create draft release
        if: steps.resolve.outputs.skip != 'true'
        shell: bash
        run: |
          NEW_TAG="${{ steps.resolve.outputs.new_tag }}"
          if gh release view "$NEW_TAG" &>/dev/null; then
            echo "Release $NEW_TAG already exists – skipping creation."
          else
            gh release create "$NEW_TAG" \
              --draft \
              --title "Chirpity $NEW_TAG" \
              --generate-notes
            echo "✅ Draft release $NEW_TAG created."
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # Matrix build across all three platforms.
  # fail-fast: false ensures all results are collected even if one OS fails.
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build on ${{ matrix.os }}
    needs: prepare
    if: needs.prepare.result == 'success' && needs.prepare.outputs.skip != 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      CI: true
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
        with:
          lfs: true
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        # npm audit fix is intentionally omitted: it mutates package-lock.json at
        # runtime, making builds non-reproducible. Fix vulnerabilities locally and
        # commit the updated lock file instead.
        shell: bash
        run: |
          npm install

          
      - name: Move tensorflow.dll to napi-v8 folder
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mv ./node_modules/@tensorflow/tfjs-node/deps/lib/tensorflow.dll \
             ./node_modules/@tensorflow/tfjs-node/lib/napi-v8/tensorflow.dll
          ls -l ./node_modules/@tensorflow/tfjs-node/lib/napi-v8/tensorflow.dll

      - name: Set platform-specific ffmpeg vars
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            PLATFORM="win32-x64"
            BINARY="ffmpeg.exe"
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            PLATFORM="darwin-arm64"
            chmod +x ./build/$PLATFORM/ffmpeg
            BINARY="ffmpeg"
          elif [[ "$RUNNER_OS" == "Linux" ]]; then
            PLATFORM="linux-x64"
            chmod +x ./build/$PLATFORM/ffmpeg
            BINARY="ffmpeg"
          fi
          echo "PLATFORM=$PLATFORM" >> $GITHUB_ENV
          echo "BINARY=$BINARY"     >> $GITHUB_ENV

      - name: Overwrite FFmpeg binary
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cp ./build/$PLATFORM/$BINARY ./node_modules/@ffmpeg-installer/$PLATFORM/$BINARY

      - name: Patch fluent-ffmpeg - increase spawn timeout
        shell: bash
        run: |
          sed -i.bak 's/, 20);/, 5000);/' ./node_modules/fluent-ffmpeg/lib/processor.js
          rm -f ./node_modules/fluent-ffmpeg/lib/processor.js.bak

      - name: Patch easepick - fix Portuguese locale
        shell: bash
        run: |
          sed -i.bak "s/toLocaleString(this.picker.options.lang/toLocaleString(this.picker.options.lang.replace(\/_.*$\/,'')/g" \
            ./node_modules/@easepick/bundle/dist/index.umd.js
          rm -f ./node_modules/@easepick/bundle/dist/index.umd.js.bak

      - name: Patch wavesurfer.js - handle AbortError in play()
        shell: bash
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');
          const filePath = path.resolve('./node_modules/wavesurfer.js/dist/player.js');
          let contents = fs.readFileSync(filePath, 'utf8');
          const patched = contents.replace(
            /return this\.media\.play\(\);/,
            `try {
                        return this.media.play();
                      } catch (err) {
                        if (err instanceof DOMException && err.name === 'AbortError') return;
                        throw err;
                      }`
          );
          if (patched === contents) {
            console.error('❌ Wavesurfer patch failed – pattern not found');
            process.exit(1);
          }
          fs.writeFileSync(filePath, patched);
          console.log('✅ Patched wavesurfer.js play()');
          EOF

      - name: Switch tracking to production ID
        shell: bash
        run: |
          sed -i.bak '1,30s/const ID_SITE = 3;/const ID_SITE = 2;/' ./js/utils/tracking.js
          rm -f ./js/utils/tracking.js.bak

      - name: Run unit tests
        run: npm run unittest

      - name: Build Electron application
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            npm run build
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            chmod -Rv u+w ./node_modules
            npm run export
          else
            chmod -R u+w ./node_modules
            npm run build-linux
          fi

      - name: Verify installer artifact
        shell: bash
        run: |
          VERSION=$(jq -r '.version' package.json)
          # Derive arch from the runner: uname -m returns arm64 or x86_64
          ARCH=$(uname -m)
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            FILENAME="Chirpity Setup $VERSION.exe"
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            ARCH=$(uname -m | sed 's/x86_64/x64/')
            FILENAME="Chirpity-${ARCH}.dmg"
          else
            FILENAME="Chirpity-${ARCH}.AppImage"
          fi
          if [ -f "./dist/$FILENAME" ]; then
            echo "✅ $FILENAME found in ./dist"
          else  
            echo "❌ $FILENAME not found in ./dist" && exit 1
          fi

      - name: Cache Perch model archive
        if: runner.os != 'Linux'
        id: cache-perch
        uses: actions/cache@v5
        with:
          path: Perch.v2.7z
          key: perch-model-v2-7z

      - name: Download Perch Sound Model
        if: runner.os != 'Linux' && steps.cache-perch.outputs.cache-hit != 'true'
        shell: bash
        run: |
          curl -L -o Perch.v2.7z \
            https://github.com/Mattk70/Chirpity-Website/releases/download/v4.0.0/Perch.v2.7z

      - name: Extract Perch model
        # 7zip is pre-installed on all GitHub-hosted runners (Windows, macOS, Linux).
        # choco install 7zip is not needed.
        if: runner.os != 'Linux'
        shell: bash
        run: 7z x "Perch.v2.7z" -o"$PWD"

      - name: Export Perch model path for Playwright
        if: runner.os != 'Linux'
        shell: bash
        run: echo "PERCH_MODEL_PATH=$GITHUB_WORKSPACE/Perch v2" >> $GITHUB_ENV

      - name: Download Chaffinch Sound file
        run: |
          curl -L -o chaffinch.mp3 \
            https://chirpity.net/downloads/chaffinch.mp3

      - name: Export Chaffinch.mp3 path for Playwright
        run: echo "CHAFFINCH_MP3_PATH=$PWD/chaffinch.mp3" >> $GITHUB_ENV

      - name: Test packaged application
        if: runner.os != 'Linux'
        run: npm test