name: Build Intel Mac version
run-name: ${{ github.actor }} is building Chirpity for Intel Mac

on:
  push:
    branches:
      - 'Development'
      - 'bug-fix'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Runs ONCE (not in the matrix): version check, git tag, draft-release creation.
  # Keeping this outside the matrix guarantees exactly one draft release is
  # created even when both mac runners start at the same time.
  # ─────────────────────────────────────────────────────────────────────────────
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    outputs:
      new_tag: ${{ steps.resolve.outputs.new_tag }}
      skip:    ${{ steps.resolve.outputs.skip }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
        with:
          lfs: true
          fetch-depth: 0

      - name: Resolve version and release state
        id: resolve
        shell: bash
        run: |
          PACKAGE_VERSION=$(jq -r .version package.json)
          NEW_TAG="v$PACKAGE_VERSION"
          LATEST_TAG=$(gh api repos/${{ github.repository }}/tags --jq '.[0].name' 2>/dev/null || echo "")

          echo "package_version : $PACKAGE_VERSION"
          echo "new_tag         : $NEW_TAG"
          echo "latest_tag      : $LATEST_TAG"

          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

          # Skip the build if this version is already a published (non-draft) release
          if [[ "$NEW_TAG" == "$LATEST_TAG" ]]; then
            RELEASE_INFO=$(gh api repos/${{ github.repository }}/releases/tags/$NEW_TAG 2>/dev/null || echo "")
            if [[ -n "$RELEASE_INFO" ]]; then
              IS_DRAFT=$(echo "$RELEASE_INFO" | jq -r '.draft')
              if [[ "$IS_DRAFT" == "false" ]]; then
                echo "⏭️  $NEW_TAG is already a published release – skipping build."
                echo "skip=true" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            fi
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Create and push Git tag
        if: steps.resolve.outputs.skip != 'true'
        shell: bash
        run: |
          NEW_TAG="${{ steps.resolve.outputs.new_tag }}"
          if git ls-remote --tags origin "refs/tags/$NEW_TAG" | grep -q "$NEW_TAG"; then
            echo "Tag $NEW_TAG already exists on remote – skipping."
          else
            git tag "$NEW_TAG"
            git push origin "$NEW_TAG"
            echo "✅ Pushed tag $NEW_TAG"
          fi

      # Creating the draft release here (once) means electron-builder on both
      # matrix runners will find an existing release and upload into it rather
      # than each trying to create their own — which was causing the duplicates.
      - name: Create draft release
        if: steps.resolve.outputs.skip != 'true'
        shell: bash
        run: |
          NEW_TAG="${{ steps.resolve.outputs.new_tag }}"
          if gh release view "$NEW_TAG" &>/dev/null; then
            echo "Release $NEW_TAG already exists – skipping creation."
          else
            gh release create "$NEW_TAG" \
              --draft \
              --title "Chirpity $NEW_TAG" \
              --generate-notes
            echo "✅ Draft release $NEW_TAG created."
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # Runs on both Intel Mac runners in parallel.
  # The draft release already exists by this point so electron-builder
  # (via npm run build-mac-x64) will upload into it rather than create a new one.
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build on ${{ matrix.runner }}
    needs: prepare
    if: needs.prepare.result == 'success' && needs.prepare.outputs.skip != 'true'
    strategy:
      fail-fast: false
      matrix:
        runner:
          - macos-15-intel
          - macos-26-intel
    runs-on: ${{ matrix.runner }}
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      CI: true
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
        with:
          lfs: true
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '19.x'
          cache: 'npm'

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          npm ci
          # Lock onnxruntime-node to 1.23.2 – 1.24.1 has build issues on Intel Mac
          npm install onnxruntime-node@1.23.2 --no-save

      - name: Set platform env vars for ffmpeg
        shell: bash
        run: |
          echo "PLATFORM=darwin-x64" >> $GITHUB_ENV
          echo "BINARY=ffmpeg"       >> $GITHUB_ENV

      - name: Patch fluent-ffmpeg - increase spawn timeout
        shell: bash
        run: |
          sed -i.bak 's/, 20);/, 5000);/' ./node_modules/fluent-ffmpeg/lib/processor.js
          rm -f ./node_modules/fluent-ffmpeg/lib/processor.js.bak

      - name: Patch easepick - fix Portuguese locale
        shell: bash
        run: |
          sed -i.bak "s/toLocaleString(this.picker.options.lang/toLocaleString(this.picker.options.lang.replace(\/_.*$\/,'')/g" \
            ./node_modules/@easepick/bundle/dist/index.umd.js
          rm -f ./node_modules/@easepick/bundle/dist/index.umd.js.bak

      - name: Patch wavesurfer.js - handle AbortError in play()
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');
          const filePath = path.resolve('./node_modules/wavesurfer.js/dist/player.js');
          let contents = fs.readFileSync(filePath, 'utf8');
          const patched = contents.replace(
            /return this\.media\.play\(\);/,
            `try {
                        return this.media.play();
                      } catch (err) {
                        if (err instanceof DOMException && err.name === 'AbortError') return;
                        throw err;
                      }`
          );
          if (patched === contents) {
            console.error('❌ Wavesurfer patch failed – pattern not found');
            process.exit(1);
          }
          fs.writeFileSync(filePath, patched);
          console.log('✅ Patched wavesurfer.js play()');
          EOF

      - name: Switch tracking to production ID
        shell: bash
        run: |
          sed -i.bak '1,30s/const ID_SITE = 3;/const ID_SITE = 2;/' ./js/utils/tracking.js
          rm -f ./js/utils/tracking.js.bak

      - name: Run unit tests
        run: npm run unittest

      - name: Build Electron application
        shell: bash
        env:
          ELECTRON_BUILD_ARCH: x64
        run: |
          chmod -Rv u+w ./node_modules
          npm run build-mac-x64

      - name: Verify installer artifact
        shell: bash
        run: |
          if [ -f "./dist/Chirpity-x64.dmg" ]; then
            echo "✅ Chirpity-x64.dmg found in ./dist"
          else
            echo "❌ Chirpity-x64.dmg not found in ./dist" && exit 1
          fi

      - name: Cache Perch model archive
        id: cache-perch
        uses: actions/cache@v5
        with:
          path: Perch.v2.7z
          key: perch-model-v2-7z

      - name: Download Perch Sound Model
        if: steps.cache-perch.outputs.cache-hit != 'true'
        run: |
          curl -L -o Perch.v2.7z \
            https://github.com/Mattk70/Chirpity-Website/releases/download/v4.0.0/Perch.v2.7z

      - name: Extract Perch model
        run: 7z x Perch.v2.7z

      - name: Export Perch model path for Playwright
        run: echo "PERCH_MODEL_PATH=$PWD/Perch v2" >> $GITHUB_ENV


      - name: Download Chaffinch Sound file
        run: |
          curl -L -o chaffinch.mp3 \
            https://chirpity.net/downloads/chaffinch.mp3

      - name: Export Chaffinch.mp3 path for Playwright
        run: echo "CHAFFINCH_MP3_PATH=$PWD/chaffinch.mp3" >> $GITHUB_ENV

      - name: Test packaged application
        run: npm test